<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { width: 320px; font-family: system-ui, sans-serif; padding: 16px; background: #0a0a0a; color: #fafafa; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p { font-size: 12px; color: #a1a1aa; margin: 0 0 12px; }
    button { width: 100%; padding: 10px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    button:hover { background: #6d28d9; }
    #status { margin-top: 12px; font-size: 12px; color: #4ade80; display: none; }
    .job-preview { background: #18181b; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; }
    .job-preview strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <h1>CareerPilot</h1>
  <p>Save this job to your Tracker</p>
  <div id="preview" class="job-preview">Detecting job...</div>
  <button id="saveBtn">Save to Tracker</button>
  <div id="status">Saved! Open CareerPilot to view.</div>
  <script src="popup.js"></script>
</body>
</html>
